<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Simple Blog{% endblock %}</title>
</head>
<body>
    <header>
        {% if request.path == '/' %}
            <h1>Simple Blog</h1>
        {% else %}
            <p><a href="{% url 'simple_blog:index' %}">Simple Blog</a></p>
        {% endif %}
    </header>
    {% block content %}{% endblock %}
</body>
</html>
