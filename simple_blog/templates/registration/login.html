{% extends 'components/base.html' %}
{% block title %}ログインページ | {{ block.super }}{% endblock %}
{% block content %}
    <form method="POST">
        {% csrf_token %}
        <div>
            {{ form.username.label }}
            {{ form.username }}
        </div>
        <div>
            {{ form.password.label }}
            {{ form.password }}
        </div>
        <div>
            <button type="submit">ログインする</button>
        </div>
    </form>
{% endblock %}
